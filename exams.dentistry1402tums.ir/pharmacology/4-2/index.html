<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>آزمون جلسه ۴ - بخش دوم (آنتی‌آریتمی و آنژین)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      color: #111827;
      padding: 16px;
      display: flex;
      justify-content: center;
    }

    .wrapper {
      width: 100%;
      max-width: 720px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
      padding: 16px 14px 14px;
      margin-bottom: 14px;
      border: 1px solid #e5e7eb;
    }

    .title-card {
      margin-bottom: 12px;
    }

    .title {
      margin: 0 0 4px;
      font-size: 1rem;
      font-weight: 600;
    }

    .subtitle {
      margin: 0;
      font-size: 0.8rem;
      color: #6b7280;
    }

    .quiz-card {
      margin-top: 4px;
    }

    .question-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    #question-header {
      font-size: 0.86rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #1e3a8a;
    }

    .progress {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #progress-label {
      font-size: 0.72rem;
      color: #6b7280;
      text-align: left;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #38bdf8, #0ea5e9);
      transition: width 0.3s ease-out;
    }

    #question-text {
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      cursor: pointer;
      font-size: 0.86rem;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .option:hover {
      background: #f3f4ff;
      border-color: #c7d2fe;
    }

    .option input {
      display: none;
    }

    .radio-dot {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 1px solid #9ca3af;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .radio-inner {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: transparent;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .option.selected {
      background: #e0f2fe;
      border-color: #38bdf8;
    }

    .option.selected .radio-inner {
      background: #0ea5e9;
      transform: scale(1.05);
    }

    .buttons-column {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }

    button {
      width: 100%;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      background: #ffffff;
      font-size: 0.85rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, transform 0.08s ease;
    }

    button:hover:not(:disabled) {
      background: #f9fafb;
      border-color: #9ca3af;
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.08);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.45;
      cursor: default;
      box-shadow: none;
      transform: none;
    }

    #next-btn {
      border-color: #bfdbfe;
      background: #eff6ff;
    }

    #next-btn:hover:not(:disabled) {
      background: #dbeafe;
      border-color: #60a5fa;
    }

    #submit-btn {
      border-color: #22c55e;
      background: #22c55e;
      color: #ffffff;
      font-weight: 500;
    }

    #submit-btn:hover:not(:disabled) {
      background: #16a34a;
      border-color: #15803d;
      box-shadow: 0 6px 16px rgba(22, 163, 74, 0.25);
    }

    #status {
      margin-top: 8px;
      font-size: 0.76rem;
      color: #6b7280;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .result-main {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
    }

    .result-main h2 {
      margin: 0 0 6px;
      font-size: 0.95rem;
    }

    .score-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      font-size: 0.8rem;
      color: #374151;
    }

    .score-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
    }

    .percent-big {
      font-size: 1.4rem;
      font-weight: 700;
      text-align: left;
    }

    .percent-big.bad {
      color: #ef4444;
    }

    .percent-label {
      font-size: 0.72rem;
      color: #6b7280;
      text-align: left;
    }

    .muted {
      color: #6b7280;
      font-size: 0.78rem;
      margin-top: 4px;
    }

    .summary-question {
      padding-top: 4px;
      margin-top: 4px;
      border-top: 1px solid #e5e7eb;
      font-size: 0.82rem;
    }

    .summary-question:first-of-type {
      border-top: none;
      margin-top: 0;
      padding-top: 0;
    }

    .summary-question-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .summary-line {
      margin: 1px 0;
    }

    .summary-label {
      color: #6b7280;
    }

    .correct {
      color: #16a34a;
      font-weight: 600;
    }

    .incorrect {
      color: #dc2626;
      font-weight: 600;
    }

    .explanation {
      margin-top: 4px;
      color: #374151;
    }

    .quiz-disabled {
      opacity: 0.55;
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .card {
        padding: 14px 12px 12px;
      }
      #question-text {
        font-size: 0.88rem;
      }
      .option {
        font-size: 0.84rem;
      }
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="card title-card">
      <h1 class="title">جلسه ۴ - بخش دوم (آنتی‌آریتمی، آنژین، نیترات‌ها)</h1>
      <p class="subtitle">۲۰ سؤال چهارگزینه‌ای | آنتی‌آریتمی‌ها، آنژین، نیترات‌ها، CCB و بتابالکرها | پاسخ‌ها بعد از پایان آزمون نمایش داده می‌شوند.</p>
    </div>

    <div id="quiz-area" class="card quiz-card">
      <div class="question-header-row">
        <div id="question-header"></div>
        <div class="progress">
          <span id="progress-label">۰٪ انجام شده</span>
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>
      </div>

      <div id="question-text"></div>
      <div id="options" class="options"></div>

      <div class="buttons-column">
        <button id="next-btn">سؤال بعدی ⟶</button>
        <button id="prev-btn">⟵ سؤال قبلی</button>
        <button id="submit-btn">پایان آزمون و تصحیح</button>
      </div>

      <div id="status"></div>
    </div>

    <div id="result"></div>
  </div>

  <script>
    const questions = [

          "A) کلاس I : مهارکننده گیرنده‌های بتا",

        explanation: "کلاس III ضدآریتمی‌ها روی کانال‌های پتاسیمی اثر کرده و فاز ۳ پتانسیل عمل را طولانی می‌کنند؛ سوتالول و آمیودارون مهم‌ترین داروهای این دسته‌اند."
      },
      {
        text: "۲) کدام‌یک از داروهای زیر به‌علت ایجاد عارضه «لوپوس دارویی» در مصرف طولانی‌مدت شناخته شده است؟",
        options: [
          "A) دیزوپیرامید",
          "B) پروکائین‌آمید",
          "C) کینیدین",
          "D) لیدوکائین"

        correctIndex: 1,
        explanation: "پروکائین‌آمید (کلاس IA) علاوه‌بر مهار کانال سدیم، روی کانال پتاسیم نیز اثر کرده و طول QRS را افزایش می‌دهد و در مصرف طولانی می‌تواند لوپوس‌مانند ایجاد کند."
      },
      {
        text: "۳) بیمار مبتلا به BPH و گلوکوم زاویه بسته دچار آریتمی شده است. تجویز کدام داروی ضدآریتمی زیر به‌علت عوارضش منع مصرف دارد؟",
        options: [
          "A) دیزوپیرامید",
          "B) پروکائین‌آمید",
          "C) کینیدین",

        correctIndex: 0,
        explanation: "دیزوپیرامید (کلاس IA) دو ویژگی مهم دارد: فرم خوراکی و اثرات آنتی‌کولینرژیک قوی (خشکی دهان، یبوست، احتباس ادرار، تاری دید). به همین دلیل در BPH و گلوکوم منع مصرف دارد."
      },
      {
        text: "۴) بروز «سینکونیسم» شامل سردرد، گیجی و وزوز گوش بیشتر با مصرف کدام داروی زیر دیده می‌شود؟",
        options: [
          "A) کینیدین",
          "B) لیدوکائین",
          "C) فلکائینید",
          "D) مکسیلیتین"
        ],
        correctIndex: 0,
        explanation: "کینیدین (کلاس IA) می‌تواند عارضه سینکونیسم (سردرد، گیجی، وزوز گوش) بدهد و به‌دلیل عوارض متعدد، امروزه کمتر استفاده می‌شود."
      },
      {
        text: "۵) کدام گزینه در مورد لیدوکائین به‌عنوان داروی ضدآریتمی صحیح است؟",
        options: [
          "A) فقط به‌صورت خوراکی اثر ضدآریتمی دارد.",
          "B) منحصراً روی دهلیزها اثر می‌کند.",

        ],
        correctIndex: 2,
        explanation: "لیدوکائین (کلاس IB) یک بی‌حس‌کننده موضعی است که به‌عنوان ضدآریتمی منحصراً به‌صورت IV/IM استفاده می‌شود و انتخابی روی بافت ایسکمیک بطنی اثر می‌کند و روی دهلیزها اثر کمی دارد."
      },
      {
        text: "۶) کدام گزینه در مورد کلاس IB داروهای ضدآریتمی صحیح است؟",

        correctIndex: 1,
        explanation: "داروهای کلاس IB مانند لیدوکائین و مکسیلیتین سدیم‌چنل‌بلوکر هستند که به‌صورت انتخابی روی بافت ایسکمیک یا دپولاریزه بطنی و پورکنژ اثر می‌کنند."
      },
      {
        text: "۷) کدام داروی زیر از کلاس IC بوده و می‌تواند هم آریتمی‌های دهلیزی و هم بطنی مقاوم به سایر داروها را درمان کند، هرچند خطر آریتموژن بودن بالایی دارد؟",

          "A) لیدوکائین",
          "B) فلکائینید",
          "C) دیزوپیرامید",
          "D) آدنوزین"
        ],
        correctIndex: 1,
        explanation: "فلکائینید (کلاس IC) سدیم‌چنل‌بلوکر قوی است که هم آریتمی دهلیزی و هم بطنی، مخصوصاً موارد مقاوم را می‌تواند کنترل کند، اما خودش می‌تواند آریتمی ایجاد کند."
      },
      {
        text: "۸) کدام بتابلوکر برای درمان حاد آریتمی به‌دلیل نیمه‌عمر بسیار کوتاه به‌صورت وریدی تجویز می‌شود؟",
        options: [
          "A) پروپرانولول",
          "B) متورال (متوپرولول)",

        explanation: "اسمولول یک بتابلوکر بسیار کوتاه‌اثر است که در آریتمی حاد (مثال بعد از MI) به‌صورت IV برای تصحیح ریت به کار می‌رود؛ برای پیشگیری طولانی‌مدت از پروپرانولول و متورال استفاده می‌شود."
      },
      {
        text: "۹) کدام‌یک از موارد زیر در مورد آمیودارون صحیح است؟",

          "A) فقط روی کانال پتاسیم اثر دارد و عوارض مهمی ندارد.",
          "B) هم کانال‌های سدیمی، کلسیمی، پتاسیمی و هم گیرنده‌های بتا را مهار می‌کند.",
          "C) نیمه‌عمر کوتاهی دارد و برای کنترل حاد آریتمی استفاده می‌شود.",

        ],
        correctIndex: 1,
        explanation: "آمیودارون از کلاس III است ولی طیف اثرش وسیع است؛ کانال‌های سدیم، کلسیم، پتاسیم و گیرنده‌های بتاآدرنرژیک را مهار می‌کند و بنابراین کمتر آریتموژن است، ولی عوارض متعددی مثل اختلال عملکرد تیروئید، فیبروز ریه، رسوب قرنیه و نوروپاتی دارد."
      },
      {
        text: "۱۰) در مورد آدنوزین کدام عبارت صحیح است؟",

        ],
        correctIndex: 1,
        explanation: "آدنوزین از نوترینت‌های طبیعی بدن است؛ به‌صورت بولوس وریدی با دوز بالا داده می‌شود و احتمالاً با افزایش جریان K⁺ و کاهش جریان Ca²⁺ باعث هیپرپلاریزاسیون و کاهش/بلوک هدایت در گره AV می‌شود."

        explanation: "پتاسیم ضربان‌های نابجا (ازجمله در مسمومیت با دیژیتال) را سرکوب می‌کند و هیپوکالمی در مسمومیت با دیژیتال باعث بروز آریتمی می‌شود. منیزیوم در آریتمی‌های ناشی از دیژیتال و Torsades de pointes مؤثر است و باید سطح پتاسیم در درمان آریتمی به محدوده طبیعی برگردد."

        ],

        explanation: "NO در اندوتلیوم از ال‌آرژینین توسط eNOS ساخته می‌شود، روی عضله صاف عروق با افزایش cGMP باعث وازودیلاسیون می‌گردد و طول عمر بسیار کوتاهی در حد چند ثانیه دارد؛ بنابراین داروهای مبتنی بر NO (نیترات‌ها) نیز کوتاه‌اثرند."
      },
      {
        text: "۱۶) کدام مورد جزء کاربردهای بالینی نیترات‌ها طبق جزوه است؟",
        options: [
          "A) درمان حاد آسم",
          "B) درمان آنژین پایدار و ناپایدار و وازواسپاستیک و نیز مسمومیت با سیانید",
          "C) پیشگیری از میگرن",
          "D) درمان مزمن نارسایی کلیه"
        ],
        correctIndex: 1,
        explanation: "نیترات‌ها با وازودیلاسیون و کاهش Preload/Afterload در آنژین پایدار، ناپایدار، وازواسپاستیک، سندروم حاد کرونری و نیز در مسمومیت با سیانید کاربرد دارند."
      },
      {
        text: "۱۷) در مورد تحمل (Tolerance) نسبت به نیترات‌ها کدام گزینه صحیح‌تر است؟",
        options: [
          "A) برای جلوگیری از تحمل، باید نیترات‌ها را دقیقاً هر ۱۲ ساعت منظم مصرف کرد.",
          "B) تحمل فقط در مصرف وریدی دیده می‌شود.",
          "C) کارگران کارخانه نیتروگلیسیرین نمونه‌ای از بروز تحمل به نیترات‌ها هستند و برای جلوگیری، توصیه می‌شود دارو در زمان‌های غیرقرینه مصرف شود تا بدن شب‌ها بدون دارو باشد.",
          "D) پدیده تحمل فقط به صورت تئوریک است و در بالین اهمیتی ندارد."

        correctIndex: 2,
        explanation: "کارگران کارخانه نیتروگلیسیرین هر دوشنبه دچار سردرد ضرباندار می‌شدند و در طول هفته تحمل ایجاد می‌شد (Monday disease). برای پیشگیری از تحمل، توصیه شده نیترات‌ها در زمان‌های غیرقرینه مصرف شوند تا بدن در بخشی از شبانه‌روز بدون دارو باشد."
      },
      {
        text: "۱۸) کدام‌یک از عوارض زیر به‌عنوان مهم‌ترین عارضه CCBها در جزوه ذکر شده و خصوصاً با آملودیپین دیده می‌شود؟",
        options: [
          "A) نوتروپنی",
          "B) ادم پره‌تیبیال (تجمع مایع جلوی ساق پا)",
          "C) زخم معده",
          "D) ریزش مو"
        ],
        correctIndex: 1,
        explanation: "ادم پره‌تیبیال به‌عنوان مهم‌ترین عارضه CCBها ذکر شده است که با تجمع مایعات در قسمت جلوی استخوان درشت‌نی مشخص می‌شود و خصوصاً در آملودیپین شایع است."
      },
      {
        text: "۱۹) کدام گزینه در مورد بتابلوکرها در درمان آنژین صحیح است؟",
        options: [
          "A) در درمان حاد حمله آنژین داروهای انتخابی هستند.",
          "B) عمدتاً از طریق کاهش ریت، نیروی انقباضی و تنش قلبی، نیاز اکسیژن را کم می‌کنند.",
          "C) خون‌رسانی کرونری را به‌طور مستقیم افزایش می‌دهند.",
          "D) هیچ‌گونه منع مصرفی در آسم یا برادیکاردی ندارند."
        ],
        correctIndex: 1,
        explanation: "بتابلوکرها در آنژین از طریق کاهش ضربان، نیروی انقباض و تنش دیواره‌ای، نیاز قلب به اکسیژن را کاهش می‌دهند و در Supply نقش زیادی ندارند. در درمان حاد آنژین استفاده نمی‌شوند و در آسم، برادیکاردی و نارسایی قلبی منع مصرف دارند."
      },
      {
        text: "۲۰) کدام داروی زیر در جزوه به‌عنوان «مهم‌ترین داروی جدید ضد آنژین» معرفی شده است؟",
        options: [
          "A) ایوابرادین",
          "B) فاسودییل",
          "C) تریمتازیدین",
          "D) نیمودیپین"
        ],
        correctIndex: 2,
        explanation: "در بخش داروهای جدید ضد آنژین، تریمتازیدین به‌صراحت به‌عنوان «مهم‌ترین داروی جدید ضد آنژین» ذکر شده است؛ در کنار آن، ایوابرادین و فاسودییل نیز به‌عنوان داروهای جدید مطرح شده‌اند."
      }
    ];

    let currentQuestionIndex = 0;
    const userAnswers = new Array(questions.length).fill(null);

    const questionHeaderEl = document.getElementById("question-header");
    const questionTextEl = document.getElementById("question-text");
    const optionsEl = document.getElementById("options");
    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");
    const submitBtn = document.getElementById("submit-btn");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const quizAreaEl = document.getElementById("quiz-area");
    const progressFillEl = document.getElementById("progress-fill");
    const progressLabelEl = document.getElementById("progress-label");

    function renderQuestion() {
      const q = questions[currentQuestionIndex];
      questionHeaderEl.textContent = `سؤال ${currentQuestionIndex + 1} از ${questions.length}`;
      questionTextEl.textContent = q.text;
      optionsEl.innerHTML = "";

      q.options.forEach((opt, idx) => {
        const label = document.createElement("label");
        label.className = "option";

        const input = document.createElement("input");
        input.type = "radio";
        input.name = "option";
        input.value = idx;

        if (userAnswers[currentQuestionIndex] === idx) {
          input.checked = true;
          label.classList.add("selected");
        }

        input.addEventListener("change", () => {
          userAnswers[currentQuestionIndex] = idx;

          Array.from(optionsEl.querySelectorAll(".option")).forEach(el => el.classList.remove("selected"));
          label.classList.add("selected");

          updateStatus();
          autoNext();
        });

        const radio = document.createElement("div");
        radio.className = "radio-dot";
        const inner = document.createElement("div");
        inner.className = "radio-inner";
        radio.appendChild(inner);

        const textSpan = document.createElement("span");
        textSpan.textContent = opt;

        label.appendChild(input);
        label.appendChild(radio);
        label.appendChild(textSpan);
        optionsEl.appendChild(label);
      });

      prevBtn.disabled = currentQuestionIndex === 0;
      nextBtn.disabled = currentQuestionIndex === questions.length - 1;

      updateStatus();
    }

    function updateStatus() {
      const answeredCount = userAnswers.filter(a => a !== null).length;
      const total = questions.length;
      const percent = total === 0 ? 0 : Math.round((answeredCount / total) * 100);

      statusEl.innerHTML = `
        <span>پاسخ‌داده‌شده: ${answeredCount} از ${total}</span>
        <span>پیشرفت: ${percent}٪</span>
      `;

      progressFillEl.style.width = percent + "%";
      progressLabelEl.textContent = percent + "% انجام شده";
    }

    function goToNext() {
      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
      }
    }

    function goToPrev() {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderQuestion();
      }
    }

    function autoNext() {
      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
      }
    }

    prevBtn.addEventListener("click", goToPrev);
    nextBtn.addEventListener("click", goToNext);

    submitBtn.addEventListener("click", () => {
      let correctCount = 0;
      let unansweredCount = 0;

      questions.forEach((q, i) => {
        if (userAnswers[i] === null) {
          unansweredCount++;
        } else if (userAnswers[i] === q.correctIndex) {
          correctCount++;
        }
      });

      const total = questions.length;
      const percent = total === 0 ? 0 : Math.round((correctCount / total) * 100);

      let html = `
        <div class="card">
          <div class="result-main">
            <div>
              <h2>نتیجه آزمون</h2>
              <div class="score-chip">
                <span class="score-dot"></span>
                <span>${correctCount} سؤال درست از ${total}</span>
              </div>
              ${unansweredCount > 0
                ? `<p class="muted">${unansweredCount} سؤال بدون پاسخ بود (در محاسبه، نادرست محسوب شده‌اند).</p>`
                : `<p class="muted">همه سؤالات را پاسخ داده‌اید.</p>`
              }
            </div>
            <div>
              <div class="percent-big ${percent < 60 ? "bad" : ""}">${percent}٪</div>
              <div class="percent-label">درصد نهایی</div>
            </div>
          </div>
        </div>
        <div class="card">
          <h2 style="margin:0 0 6px;font-size:0.9rem;">بررسی سؤالات</h2>
          <p class="muted" style="margin-top:0;">برای هر سؤال، پاسخ خودت، پاسخ صحیح و توضیح جزوه نوشته شده است.</p>
      `;

      questions.forEach((q, i) => {
        const userIndex = userAnswers[i];
        const isCorrect = userIndex === q.correctIndex;
        const userText = userIndex !== null ? q.options[userIndex] : "بدون پاسخ";
        const correctText = q.options[q.correctIndex];
        const explanationText = q.explanation || "توضیحی ثبت نشده است.";

        html += `
          <div class="summary-question">
            <div class="summary-question-title">سؤال ${i + 1}</div>
            <div class="summary-line">
              <span class="summary-label">متن سؤال: </span>${q.text}
            </div>
            <div class="summary-line">
              <span class="summary-label">پاسخ شما: </span>
              <span class="${isCorrect ? "correct" : "incorrect"}">${userText}</span>
            </div>
            <div class="summary-line">
              <span class="summary-label">پاسخ صحیح: </span>
              <span class="correct">${correctText}</span>
            </div>
            <div class="explanation">
              <span class="summary-label">توضیح: </span>${explanationText}
            </div>
          </div>
        `;
      });

      html += "</div>";

      resultEl.innerHTML = html;

      quizAreaEl.classList.add("quiz-disabled");
    });

    // init
    renderQuestion();
  </script>

</body>
</html>
