<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#050b14">
    <title>آفلاین | ورودی ۱۴۰۲ دندانپزشکی</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="/assets/site/styles/core.css?v=20260421-pwa">
    <style>
        body.offline-page main {
            flex: 1;
            width: min(720px, 100%);
            margin: 0 auto;
            padding: 2rem 5%;
            display: flex;
            align-items: center;
        }

        .offline-card {
            width: 100%;
            padding: 1.4rem;
            border-radius: 28px;
            border: 1px solid rgba(35, 53, 84, 0.92);
            background:
                radial-gradient(circle at 10% 10%, rgba(0, 223, 216, 0.12), transparent 24%),
                linear-gradient(180deg, rgba(17, 27, 43, 0.98), rgba(11, 22, 36, 0.98));
            box-shadow: var(--surface-shadow);
        }

        .offline-card h2 {
            margin: 0 0 0.75rem;
            font-size: clamp(1.45rem, 3vw, 2rem);
            font-weight: 900;
            line-height: 1.6;
        }

        .offline-card p {
            margin: 0;
            color: var(--text-secondary);
        }

        .offline-actions {
            margin-top: 1rem;
            display: flex;
            gap: 0.7rem;
            flex-wrap: wrap;
        }
    </style>
</head>
<body class="offline-page">
    <div class="background-overlay" aria-hidden="true"></div>
    <header class="site-header">
        <div class="logo-area">
            <div class="logo-circle">
                <img src="/assets/images/logo.png" alt="لوگوی ورودی ۱۴۰۲ دندانپزشکی">
            </div>
            <div class="site-info">
                <h1>ورودی ۱۴۰۲ دندانپزشکی</h1>
                <p>خانه دانشجو</p>
            </div>
        </div>
    </header>
    <main>
        <section class="offline-card">
            <span class="app-pill">اتصال قطع شده</span>
            <h2>الان اینترنت قطع است.</h2>
            <p>وقتی اتصال برگردد، دوباره می‌توانی به چت، آزمون‌ها، نمرات و جزوات برگردی.</p>
            <div class="offline-actions">
                <a class="shell-action-btn shell-action-btn-primary" href="/app/">بازگشت به خانه</a>
                <button class="shell-action-btn" type="button" onclick="window.location.reload()">تلاش دوباره</button>
            </div>
        </section>
    </main>
</body>
</html>
