    .percent-big {

      <p class="subtitle">۲۰ سؤال چهارگزینه‌ای | MAC، نیتروس‌اکساید، هالوتان، کتامین، اتومیدیت، سوکسینیل‌کولین و ... | پاسخ‌ها بعد از پایان آزمون نمایش داده می‌شوند.</p>

  <script>
    const questions = [
      {
        text: "۱) در مورد مکانیسم کلی داروهای بیهوش‌کننده عمومی کدام گزینه صحیح‌تر است؟",
        options: [
          "A) با مهار کامل تمام نورون‌های قشری، بیهوشی ایجاد می‌کنند.",
          "B) با افزایش فعالیت نوروتراسمیتر تحریکی گلوتامات موجب بیهوشی می‌شوند.",
          "C) با افزایش فعالیت GABA و ورود یون کلر به نورون و هیپرپلاریزاسیون، سیستم عصبی مرکزی را تضعیف می‌کنند.",
          "D) فقط با بلوک کانال‌های سدیمی ولتاژ-وابسته بیهوشی می‌دهند."
        ],
        correctIndex: 2,
        explanation: "مهم‌ترین نوروترانسمیتر مهاری در مغز GABA است که روی کانال‌های کلر اثر می‌گذارد، ورود Cl⁻ را زیاد می‌کند و با هیپرپلاریزاسیون، سلول را از آستانه تحریک دور می‌کند؛ این پایه اثر بسیاری از داروهای بیهوشی و آرام‌بخش است."
      },
      {
        text: "۲) کدام‌یک از موارد زیر مکانیسم دقیق‌تری برای داروهای بیهوش‌کننده استنشاقی است؟",
        options: [
          "A) اتصال اختصاصی و انحصاری به یک گیرنده خاص در مغز",
          "B) فقط مهار کانال‌های سدیمی در نورون‌های حسی",
          "C) ایجاد تغییر در تعادل بین سیستم‌های تحریکی و مهاری (افزایش اثر مهاری و کاهش اثر تحریکی) بدون داشتن یک رسپتور بیولوژیک خاص",
          "D) افزایش تنها ترشح اندورفین‌ها در CNS"
        ],
        correctIndex: 2,
        explanation: "برای داروهای بیهوش‌کننده عمومی، رسپتور بیولوژیک خاص تعریف نشده و اثر آن‌ها بیشتر به صورت تغییر در فعالیت نوروترانسمیترها (افزایش مهاری مثل GABA، کاهش تحریکی مثل گلوتامات) و نیز انحلال در چربی و تغییر ویژگی غشاء است."
      },
      {
        text: "۳) در مورد کاربرد بیهوش‌کننده‌های وریدی و استنشاقی در عمل جراحی عمومی، کدام گزینه صحیح است؟",
        options: [
          "A) هر دو فقط برای القای بیهوشی به‌کار می‌روند.",
          "B) بیهوش‌کننده استنشاقی برای القا و بیهوش‌کننده وریدی برای نگهداری استفاده می‌شود.",
          "C) بیهوش‌کننده وریدی عمدتاً برای القا و بیهوش‌کننده استنشاقی بیشتر برای حفظ و ادامه بیهوشی به کار می‌روند.",
          "D) امروزه بیهوش‌کننده استنشاقی کاربردی ندارد و فقط وریدی‌ها استفاده می‌شوند."
        ],
        correctIndex: 2,
        explanation: "برای شروع و القای بیهوشی از داروهای تزریقی (IV) و برای طولانی‌شدن مدت بیهوشی از داروهای استنشاقی استفاده می‌شود."
      },
      {
        text: "۴) در مورد ارتباط حلالیت در چربی و MAC در بیهوش‌کننده‌های استنشاقی، کدام گزینه صحیح‌تر است؟",
        options: [
          "A) با افزایش حلالیت در چربی، MAC افزایش و Potency کاهش می‌یابد.",
          "B) با افزایش حلالیت در چربی، MAC کاهش و Potency افزایش می‌یابد.",
          "C) حلالیت در چربی هیچ ارتباطی با MAC ندارد.",
          "D) دارویی که در آب محلول‌تر است، همیشه قوی‌تر است."
        ],
        correctIndex: 1,
        explanation: "با افزایش حلالیت دارو در چربی، Potency افزایش و MAC کاهش پیدا می‌کند؛ یعنی داروی محلول‌تر در چربی با MAC پایین‌تر قوی‌تر است."
      },
      {
        text: "۵) MAC (Minimum Alveolar Concentration) چه مفهومی دارد؟",
        options: [
          "A) حداکثر غلظت دارو در خون که باعث بیهوشی می‌شود.",
          "B) غلظتی از داروی بیهوشی در آلوئول که در ۵۰٪ بیماران، درد و پاسخ اتونوم به درد را مهار می‌کند.",
          "C) غلظتی که باعث بروز عوارض شدید تنفسی می‌شود.",
          "D) غلظتی که در ۱۰۰٪ بیماران از هوشیاری جلوگیری می‌کند."
        ],
        correctIndex: 1,
        explanation: "MAC غلظتی از داروی بیهوشی در آلوئول است که در ۵۰٪ بیماران جلوی درد و واکنش اتونوم را می‌گیرد و هرچه MAC کمتر باشد، دارو قوی‌تر است."
      },
      {
        text: "۶) در مورد نیتروس‌اکساید (N₂O) کدام گزینه صحیح نیست؟",
        options: [
          "A) جزء قدیمی‌ترین گازهای بیهوشی است و به گاز خنده معروف است.",
          "B) MAC بسیار بالایی دارد، بنابراین قدرت بیهوش‌کنندگی آن کم است.",
          "C) اثر ضد درد (Analgesia) خوبی دارد و شروع و ریکاوری سریعی دارد.",
          "D) در تمام بیماران می‌تواند به‌تنهایی برای بیهوشی عمیق جراحی بزرگ استفاده شود."
        ],
        correctIndex: 3,
        explanation: "نیتروس‌اکساید MAC بسیار بالایی دارد، قدرت بیهوش‌کنندگی‌اش کم است ولی اثر ضد درد قوی و شروع و ریکاوری سریع دارد و معمولاً به عنوان کمک همراه با یک بیهوش‌کننده استنشاقی قوی‌تر استفاده می‌شود، نه به‌تنهایی برای بیهوشی عمیق."
      },
      {
        text: "۷) کدام مورد در مورد عوارض نیتروس‌اکساید در مصرف مزمن صحیح است؟",
        options: [
          "A) در مصرف مزمن باعث کم‌خونی مگالوبلاستیک می‌شود.",
          "B) در مصرف مزمن باعث نارسایی حاد کبد می‌شود.",
          "C) در مصرف مزمن باعث فیبروز ریوی پیشرونده می‌شود.",
          "D) در مصرف مزمن هیچ عارضه مهمی در انسان گزارش نشده است."
        ],
        correctIndex: 0,
        explanation: "مصرف طولانی‌مدت N₂O (مثلاً در افرادی که ساعت‌های طولانی در اتاق عمل در معرض آن هستند) می‌تواند سبب اختلال در متابولیسم ویتامین B₁₂ و کم‌خونی مگالوبلاستیک شود."
      },
      {
        text: "۸) در مورد هالوتان (Halothane) کدام گزینه صحیح است؟",
        options: [
          "A) تقریباً اصلاً در بدن متابولیزه نمی‌شود.",
          "B) حدود ۵٪ آن در کبد متابولیزه شده و می‌تواند متابولیت‌های هپاتوتوکسیک ایجاد کند.",
          "C) مهم‌ترین عارضه آن تشنج در بیماران صرعی است.",
          "D) نسبت به انفلوران ایمن‌تر است و عارضه مهمی ندارد."
        ],
        correctIndex: 1,
        explanation: "بیشتر بیهوش‌کننده‌های استنشاقی متابولیزه نمی‌شوند، اما هالوتان تا حدودی در کبد متابولیزه می‌شود و متابولیت‌های هپاتوتوکسیک و هپاتیت هالوتانی ایجاد می‌کند."
      },
      {
        text: "۹) در مورد انفلوران (Enflurane) کدام‌یک صحیح‌تر است؟",
        options: [
          "A) عارضه خاصی ندارد و در صرع هم کاملاً بی‌خطر است.",
          "B) می‌تواند تغییراتی در EEG ایجاد کند و در بیماران مبتلا به صرع نباید استفاده شود.",
          "C) باعث هپاتیت شدید ایمنی‌واسطه می‌شود.",
          "D) عمدتاً متابولیت‌های نفروتوکسیک ایجاد می‌کند."
        ],
        correctIndex: 1,
        explanation: "انفلوران به‌طور کلی نسبتاً ایمن است ولی می‌تواند تغییرات خاصی در نوار مغزی ایجاد کند، بنابراین در بیماران صرعی نباید از آن استفاده شود."
      },
      {
        text: "۱۰) در مورد سووفلوران (Sevoflurane) کدام گزینه صحیح است؟",
        options: [
          "A) اصلاً متابولیزه نمی‌شود.",
          "B) به میزان قابل توجهی در کبد متابولیزه شده و متابولیت‌های نفروتوکسیک ایجاد می‌کند.",
          "C) شایع‌ترین عارضه‌اش تشنج در بیماران صرعی است.",
          "D) تنها عارضه آن تهوع و استفراغ پس از عمل است."
        ],
        correctIndex: 1,
        explanation: "Sevoflurane بر خلاف بسیاری از داروهای استنشاقی تا حدی متابولیزه می‌شود و متابولیت‌های نفروتوکسیک می‌دهد و از این جهت باید مراقب عملکرد کلیه بود."
      },
      {
        text: "۱۱) کدام ویژگی در مورد پروپوفول (Propofol) صحیح است؟",
        options: [
          "A) شایع‌ترین داروی بیهوش‌کننده وریدی امروزی است و اثر آرام‌بخش–خواب‌آور دارد ولی ضد درد نیست.",
          "B) به‌طور اختصاصی فقط روی گیرنده‌های اپیوئیدی عمل می‌کند.",
          "C) شروع اثر کند و ریکاوری بسیار طولانی دارد.",
          "D) فقط برای القای بیهوشی به‌کار می‌رود و برای نگهداری قابل استفاده نیست."
        ],
        correctIndex: 0,
        explanation: "پروپوفول شایع‌ترین داروی بیهوش‌کننده وریدی است، آرام‌بخش–خواب‌آور است و اثر ضد درد ندارد، شروع اثر و ریکاوری آن سریع است و هم برای induction و هم برای maintenance استفاده می‌شود."
      },
      {
        text: "۱۲) در کدام‌یک از شرایط زیر استفاده از پروپوفول منطقی‌تر است؟",

    let currentQuestionIndex = 0;
    const userAnswers = new Array(questions.length).fill(null);

    const questionHeaderEl = document.getElementById("question-header");
    const questionTextEl = document.getElementById("question-text");
    const optionsEl = document.getElementById("options");
    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");
    const submitBtn = document.getElementById("submit-btn");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const quizAreaEl = document.getElementById("quiz-area");
    const progressFillEl = document.getElementById("progress-fill");
    const progressLabelEl = document.getElementById("progress-label");

    function renderQuestion() {
      const q = questions[currentQuestionIndex];
      questionHeaderEl.textContent = `سؤال ${currentQuestionIndex + 1} از ${questions.length}`;
      questionTextEl.textContent = q.text;
      optionsEl.innerHTML = "";

      q.options.forEach((opt, idx) => {
        const label = document.createElement("label");
        label.className = "option";

        const input = document.createElement("input");
        input.type = "radio";
        input.name = "option";
        input.value = idx;

        if (userAnswers[currentQuestionIndex] === idx) {
          input.checked = true;
          label.classList.add("selected");
        }

        input.addEventListener("change", () => {
          userAnswers[currentQuestionIndex] = idx;

          Array.from(optionsEl.querySelectorAll(".option")).forEach(el => el.classList.remove("selected"));
          label.classList.add("selected");

          updateStatus();
          autoNext();
        });

        const radio = document.createElement("div");
        radio.className = "radio-dot";
        const inner = document.createElement("div");
        inner.className = "radio-inner";
        radio.appendChild(inner);

        const textSpan = document.createElement("span");
        textSpan.textContent = opt;

        label.appendChild(input);
        label.appendChild(radio);
        label.appendChild(textSpan);
        optionsEl.appendChild(label);
      });

      prevBtn.disabled = currentQuestionIndex === 0;
      nextBtn.disabled = currentQuestionIndex === questions.length - 1;

      updateStatus();
    }

    function updateStatus() {
      const answeredCount = userAnswers.filter(a => a !== null).length;
      const total = questions.length;
      const percent = total === 0 ? 0 : Math.round((answeredCount / total) * 100);

      statusEl.innerHTML = `
        <span>پاسخ‌داده‌شده: ${answeredCount} از ${total}</span>
        <span>پیشرفت: ${percent}٪</span>
      `;

      progressFillEl.style.width = percent + "%";
      progressLabelEl.textContent = percent + "% انجام شده";
    }

    function goToNext() {
      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
      }
    }

    function goToPrev() {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderQuestion();
      }
    }

    function autoNext() {
      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
      }
    }

    prevBtn.addEventListener("click", goToPrev);
    nextBtn.addEventListener("click", goToNext);

    submitBtn.addEventListener("click", () => {
      let correctCount = 0;
      let unansweredCount = 0;

      questions.forEach((q, i) => {
        if (userAnswers[i] === null) {
          unansweredCount++;
        } else if (userAnswers[i] === q.correctIndex) {
          correctCount++;
        }
      });

      const total = questions.length;
      const percent = total === 0 ? 0 : Math.round((correctCount / total) * 100);

      let html = `
        <div class="card">
          <div class="result-main">
            <div>
              <h2>نتیجه آزمون</h2>
              <div class="score-chip">
                <span class="score-dot"></span>
                <span>${correctCount} سؤال درست از ${total}</span>
              </div>
              ${unansweredCount > 0
                ? `<p class="muted">${unansweredCount} سؤال بدون پاسخ بود (در محاسبه، نادرست محسوب شده‌اند).</p>`
                : `<p class="muted">همه سؤالات را پاسخ داده‌اید.</p>`
              }
            </div>
            <div>
              <div class="percent-big ${percent < 60 ? "bad" : ""}">${percent}٪</div>
              <div class="percent-label">درصد نهایی</div>
            </div>
          </div>
        </div>
        <div class="card">
          <h2 style="margin:0 0 6px;font-size:0.9rem;">بررسی سؤالات</h2>
          <p class="muted" style="margin-top:0;">برای هر سؤال، پاسخ خودت، پاسخ صحیح و توضیح جزوه نوشته شده است.</p>
      `;

      questions.forEach((q, i) => {
        const userIndex = userAnswers[i];
        const isCorrect = userIndex === q.correctIndex;
        const userText = userIndex !== null ? q.options[userIndex] : "بدون پاسخ";
        const correctText = q.options[q.correctIndex];
        const explanationText = q.explanation || "توضیحی ثبت نشده است.";

        html += `
          <div class="summary-question">
            <div class="summary-question-title">سؤال ${i + 1}</div>
            <div class="summary-line">
              <span class="summary-label">متن سؤال: </span>${q.text}
            </div>
            <div class="summary-line">
              <span class="summary-label">پاسخ شما: </span>
              <span class="${isCorrect ? "correct" : "incorrect"}">${userText}</span>
            </div>
            <div class="summary-line">
              <span class="summary-label">پاسخ صحیح: </span>
              <span class="correct">${correctText}</span>
            </div>
            <div class="explanation">
              <span class="summary-label">توضیح: </span>${explanationText}
            </div>
          </div>
        `;
      });

      html += "</div>";

      resultEl.innerHTML = html;

      quizAreaEl.classList.add("quiz-disabled");
    });

    // init
    renderQuestion();
  </script>
