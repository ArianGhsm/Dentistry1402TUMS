      background: #f3f4f6;

      font-size: 0.8rem;

    .score-dot {

      border-radius: 999px;

    .percent-big {

      font-weight: 700;

    }

    .percent-big.bad {
      color: #ef4444;
    }

    .percent-label {

    .correct {

    }

    .incorrect {

    .explanation {

    }

  <script>
    const questions = [
      {
        text: "۱) در تعریف سیمپاتومیمتیک‌ها، کدام عبارت صحیح‌تر است؟",
        options: [
          "A) ترکیباتی که اثرات استیل‌کولین را روی گیرنده‌های موسکارینی تقلید می‌کنند.",
          "B) ترکیباتی که اثرات نوراپی‌نفرین را روی گیرنده‌های سیستم آدرنرژیک تقلید می‌کنند.",
          "C) ترکیباتی که فقط ترشح اپی‌نفرین از غدد فوق‌کلیوی را زیاد می‌کنند.",
          "D) فقط داروهای ضددرد اوپیوئیدی را شامل می‌شوند."
        ],
        correctIndex: 1,
        explanation: "Sympathomimetics ترکیباتی هستند که اثر نوراپی‌نفرین را روی گیرنده‌های سیستم آدرنرژیک تقلید می‌کنند."
      },
      {
        text: "۲) کدام‌یک از داروهای زیر سیمپاتومیمتیک غیرمستقیم محسوب می‌شود که با مهار ترانسپورترهای نوراپی‌نفرین/دوپامین باعث افزایش نوراپی‌نفرین می‌گردد؟",
        options: [
          "A) اپی‌نفرین",
          "B) کوکائین",
          "C) آتروپین",
          "D) پروپرانولول"
        ],
        correctIndex: 1,
        explanation: "برخی داروها مثل کوکائین، ضدافسردگی‌های سه‌حلقه‌ای و بعضی آمفتامین‌ها با مهار نوراپی‌نفرین ترانسپورتر و دوپامین ترانسپورتر باعث افزایش نوراپی‌نفرین می‌شوند؛ این‌ها سیمپاتومیمتیک‌های غیرمستقیم هستند."
      },
      {
        text: "۳) کدام مورد در مورد درمان نارکولپسی طبق جزوه صحیح است؟",
        options: [
          "A) فقط از بنزودیازپین‌ها استفاده می‌شود.",
          "B) آمفتامین‌ها از محرک‌های قدیمی CNS در این بیماری هستند.",
          "C) کوکائین به‌دلیل اثر ضدافسردگی، خط اول درمان است.",
          "D) مودافینیل یک سیمپاتومیمتیک مستقیم است."
        ],
        correctIndex: 1,
        explanation: "در نارکولپسی از محرک‌های CNS مثل آمفتامین، دکستروآمفتامین، مت‌آمفتامین و ریتالین استفاده می‌شود. داروهای جدیدتر مانند مودافینیل، آرمودافینیل و گاما هیدروکسی‌بوتیرات Agent Promoting Wakefulness و غیرسیمپاتومیمتیک هستند."
      },
      {
        text: "۴) درباره داروهای مورد استفاده در ADHD، کدام جمله صحیح است؟",
        options: [
          "A) برای افزایش تمرکز، بهترین انتخاب کوکائین است چون تمرکز را بالا می‌برد.",
          "B) آمفتامین‌ها و متیل‌فنیدات می‌توانند با اثر مرکزی روی مسیر نوراپی‌نفرین/دوپامین کمک‌کننده باشند.",
          "C) در ADHD تنها سروتونین درگیر است و نوراپی‌نفرین/دوپامین نقشی ندارند.",
          "D) استفاده مکرر از محرک‌ها باعث بی‌اثر شدن کامل دارو می‌شود."
        ],
        correctIndex: 1,
        explanation: "برای ADHD می‌توان از محرک‌های سیستم سمپاتیک با تأثیر مرکزی مثل آمفتامین‌ها، لیزدکس‌آمفتامین، متیل‌فنیدات و پمولین برای افزایش تمرکز استفاده کرد و اختلال در مسیر نوراپی‌نفرین یا دوپامین مطرح است."
      },
      {
        text: "۵) چرا طبق نکات جزوه، کوکائین برای درمان ADHD انتخاب مناسبی نیست، با وجود این‌که تمرکز را می‌تواند افزایش دهد؟",
        options: [
          "A) چون روی نوراپی‌نفرین اثری ندارد.",
          "B) چون فقط روی گیرنده‌های موسکارینی اثر می‌گذارد.",
          "C) چون با ایجاد پیک غلظتی در پلاسما و آزادسازی دوپامین در مراکز پاداش، وابستگی و سوءمصرف ایجاد می‌کند.",
          "D) چون به هیچ‌وجه از سد خونی–مغزی عبور نمی‌کند."
        ],
        correctIndex: 2,
        explanation: "اگرچه کوکائین می‌تواند تمرکز را زیاد کند، اما به دلیل ایجاد پیک غلظتی در پلاسما و تحریک آزادسازی دوپامین در مراکز پاداش، سرخوشی و پتانسیل بالای سوءمصرف دارد؛ در ADHD هدف افزایش دوپامین در قشر پیش‌پیشانی است، نه مراکز پاداش."
      },
      {
        text: "۶) کدام ترکیب زیر طبق جزوه، به‌عنوان داروی کاهش‌دهنده اشتها مطرح شده و به‌علت ایجاد فشار خون ریوی (pulmonary hypertension) دیگر کاربردی ندارد؟",
        options: [
          "A) سیبوترامین (Reductil)",
          "B) متیل‌فنیدات",
          "C) بوپروپیون",
          "D) نالترکسون"
        ],
        correctIndex: 0,
        explanation: "سیبوترامین با نام تجاری Reductil به‌عنوان کورکننده اشتها استفاده می‌شده ولی به‌علت ایجاد pulmonary hypertension دیگر کاربردی ندارد."
      },
      {
        text: "۷) در ترکیب‌های ضدچاقی ذکرشده در جزوه، کدام مورد صحیح است؟",
        options: [
          "A) توپیرامات + فنترمین، ترکیب ضداستفراغ است.",
          "B) تنها بوپروپیون است که روی سیستم نورآدرنرژیک–دوپامینرژیک اثر می‌گذارد.",
          "C) نالترکسون فقط روی گیرنده‌های GABA اثر دارد.",
          "D) تمام این ترکیبات سیمپاتومیمتیک مستقیم‌اند."
        ],
        correctIndex: 1,
        explanation: "در ترکیب‌های ضدچاقی مانند توپیرامات + فنترمین و بوپروپیون + نالترکسون، تنها بوپروپیون روی سیستم نورآدرنرژیک–دوپامینرژیک اثر می‌گذارد."
      },
      {
        text: "۸) بی‌حس‌کننده‌های موضعی بر اساس زنجیره میانی به دو گروه اصلی تقسیم می‌شوند. کدام گزینه، دسته‌بندی صحیح را نشان می‌دهد؟",
        options: [
          "A) کربوکسیلیک و آمیدی",
          "B) استری و آمیدی",
          "C) کتونی و الکلی",
          "D) کاتیونی و آنیونی"
        ],
        correctIndex: 1,
        explanation: "بی‌حس‌کننده‌های موضعی براساس نوع زنجیره میانی به دو گروه استری (پروکائین، تتراکائین، بنزوکائین) و آمیدی (لیدوکائین، پریلوکائین، بوپیواکائین، آرتیکائین) تقسیم می‌شوند."
      },
      {
        text: "۹) کدام‌یک از داروهای زیر بی‌حس‌کننده موضعی از نوع آمیدی است؟",
        options: [
          "A) پروکائین",
          "B) تتراکائین",
          "C) بوپیواکائین (مارکائین)",
          "D) بنزوکائین"
        ],
        correctIndex: 2,
        explanation: "بوپیواکائین، لیدوکائین، پریلوکائین و آرتیکائین در گروه آمیدی و پروکائین، تتراکائین و بنزوکائین در گروه استری هستند."
      },
      {
        text: "۱۰) طبق جزوه، قدرت (potency) بی‌حس‌کننده‌های موضعی نسبت به پروکائین چگونه مقایسه می‌شود؟",
        options: [
          "A) قدرت همه بی‌حس‌کننده‌ها برابر با پروکائین است.",
          "B) قدرت لیدوکائین ۱۶ برابر پروکائین است.",
          "C) قدرت تتراکائین و بوپیواکائین حدود ۱۶ برابر پروکائین است.",
          "D) پروکائین قوی‌ترین بی‌حس‌کننده موضعی است."
        ],
        correctIndex: 2,
        explanation: "Potency پروکائین را ۱ در نظر می‌گیرند و تتراکائین و بوپیواکائین حدود ۱۶ برابر قوی‌تر از پروکائین هستند؛ حلالیت بیشتر در چربی یعنی potency بالاتر."
      },
      {
        text: "۱۱) در مورد محیط اسیدی (مثلاً بافت عفونی) و اثر بی‌حس‌کننده‌های موضعی کدام گزینه درست است؟",
        options: [
          "A) در pH اسیدی، دارو بیشتر به فرم غیر یونیزه است و بهتر از غشا عبور می‌کند.",
          "B) در pH اسیدی، دارو بیشتر یونیزه می‌شود و اثر بی‌حسی کاهش می‌یابد.",
          "C) pH محیط روی بی‌حس‌کننده‌های موضعی اثری ندارد.",
          "D) در بافت عفونی، بهتر است همیشه دوز بی‌حس‌کننده را کاهش دهیم تا اثر بیشتر شود."
        ],
        correctIndex: 1,
        explanation: "بی‌حس‌کننده‌های موضعی بازهای ضعیف با pKa قلیایی هستند؛ در pH اسیدی بیشتر به فرم یونیزه درمی‌آیند، عبور از غشا کاهش می‌یابد و بی‌حسی ضعیف می‌شود."
      },
      {
        text: "۱۲) کدام گزینه درباره حساسیت انواع فیبرهای عصبی به بی‌حس‌کننده‌های موضعی صحیح است؟",
        options: [
          "A) فیبرهای A از همه حساس‌ترند.",
          "B) فیبرهای C (پست‌گانگلیونیک) بیشترین حساسیت را دارند.",
          "C) فیبرهای با قطر بزرگ‌تر، زودتر بلوک می‌شوند.",
          "D) وجود میلین حساسیت را کاهش می‌دهد."

    let currentQuestionIndex = 0;
    const userAnswers = new Array(questions.length).fill(null);

    const questionHeaderEl = document.getElementById("question-header");
    const questionTextEl = document.getElementById("question-text");
    const optionsEl = document.getElementById("options");
    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");
    const submitBtn = document.getElementById("submit-btn");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const quizAreaEl = document.getElementById("quiz-area");
    const progressFillEl = document.getElementById("progress-fill");
    const progressLabelEl = document.getElementById("progress-label");

    function renderQuestion() {
      const q = questions[currentQuestionIndex];
      questionHeaderEl.textContent = `سؤال ${currentQuestionIndex + 1} از ${questions.length}`;
      questionTextEl.textContent = q.text;
      optionsEl.innerHTML = "";

      q.options.forEach((opt, idx) => {
        const label = document.createElement("label");
        label.className = "option";

        const input = document.createElement("input");
        input.type = "radio";
        input.name = "option";
        input.value = idx;

        if (userAnswers[currentQuestionIndex] === idx) {
          input.checked = true;
          label.classList.add("selected");
        }

        input.addEventListener("change", () => {
          userAnswers[currentQuestionIndex] = idx;

          Array.from(optionsEl.querySelectorAll(".option")).forEach(el => el.classList.remove("selected"));
          label.classList.add("selected");

          updateStatus();
          autoNext();
        });

        const radio = document.createElement("div");
        radio.className = "radio-dot";
        const inner = document.createElement("div");
        inner.className = "radio-inner";
        radio.appendChild(inner);

        const textSpan = document.createElement("span");
        textSpan.textContent = opt;

        label.appendChild(input);
        label.appendChild(radio);
        label.appendChild(textSpan);
        optionsEl.appendChild(label);
      });

      prevBtn.disabled = currentQuestionIndex === 0;
      nextBtn.disabled = currentQuestionIndex === questions.length - 1;

      updateStatus();
    }

    function updateStatus() {
      const answeredCount = userAnswers.filter(a => a !== null).length;
      const total = questions.length;
      const percent = total === 0 ? 0 : Math.round((answeredCount / total) * 100);

      statusEl.innerHTML = `
        <span>پاسخ‌داده‌شده: ${answeredCount} از ${total}</span>
        <span>پیشرفت: ${percent}٪</span>
      `;

      progressFillEl.style.width = percent + "%";
      progressLabelEl.textContent = percent + "% انجام شده";
    }

    function goToNext() {
      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
      }
    }

    function goToPrev() {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderQuestion();
      }
    }

    function autoNext() {
      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
      }
    }

    prevBtn.addEventListener("click", goToPrev);
    nextBtn.addEventListener("click", goToNext);

    submitBtn.addEventListener("click", () => {
      let correctCount = 0;
      let unansweredCount = 0;

      questions.forEach((q, i) => {
        if (userAnswers[i] === null) {
          unansweredCount++;
        } else if (userAnswers[i] === q.correctIndex) {
          correctCount++;
        }
      });

      const total = questions.length;
      const percent = total === 0 ? 0 : Math.round((correctCount / total) * 100);

      let html = `
        <div class="card">
          <div class="result-main">
            <div>
              <h2>نتیجه آزمون</h2>
              <div class="score-chip">
                <span class="score-dot"></span>
                <span>${correctCount} سؤال درست از ${total}</span>
              </div>
              ${unansweredCount > 0
                ? `<p class="muted">${unansweredCount} سؤال بدون پاسخ بود (در محاسبه، نادرست محسوب شده‌اند).</p>`
                : `<p class="muted">همه سؤالات را پاسخ داده‌اید.</p>`
              }
            </div>
            <div>
              <div class="percent-big ${percent < 60 ? "bad" : ""}">${percent}٪</div>
              <div class="percent-label">درصد نهایی</div>
            </div>
          </div>
        </div>
        <div class="card">
          <h2 style="margin:0 0 6px;font-size:0.9rem;">بررسی سؤالات</h2>
          <p class="muted" style="margin-top:0;">برای هر سؤال، پاسخ خودت، پاسخ صحیح و توضیح جزوه نوشته شده است.</p>
      `;

      questions.forEach((q, i) => {
        const userIndex = userAnswers[i];
        const isCorrect = userIndex === q.correctIndex;
        const userText = userIndex !== null ? q.options[userIndex] : "بدون پاسخ";
        const correctText = q.options[q.correctIndex];
        const explanationText = q.explanation || "توضیحی ثبت نشده است.";

        html += `
          <div class="summary-question">
            <div class="summary-question-title">سؤال ${i + 1}</div>
            <div class="summary-line">
              <span class="summary-label">متن سؤال: </span>${q.text}
            </div>
            <div class="summary-line">
              <span class="summary-label">پاسخ شما: </span>
              <span class="${isCorrect ? "correct" : "incorrect"}">${userText}</span>
            </div>
            <div class="summary-line">
              <span class="summary-label">پاسخ صحیح: </span>
              <span class="correct">${correctText}</span>
            </div>
            <div class="explanation">
              <span class="summary-label">توضیح: </span>${explanationText}
            </div>
          </div>
        `;
      });

      html += "</div>";

      resultEl.innerHTML = html;

      quizAreaEl.classList.add("quiz-disabled");
    });

    // init
    renderQuestion();
  </script>
