  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      color: #111827;
      padding: 16px;
      display: flex;
      justify-content: center;
    }

    .wrapper {
      width: 100%;
      max-width: 720px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
      padding: 16px 14px 14px;
      margin-bottom: 14px;
      border: 1px solid #e5e7eb;
    }

    .title-card {
      margin-bottom: 12px;
    }

    .title {
      margin: 0 0 4px;
      font-size: 1rem;
      font-weight: 600;
    }

    .subtitle {
      margin: 0;
      font-size: 0.8rem;
      color: #6b7280;
    }

    .quiz-card {
      margin-top: 4px;
    }

    .question-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    #question-header {
      font-size: 0.86rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #1e3a8a;
    }

    .progress {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #progress-label {
      font-size: 0.72rem;
      color: #6b7280;
      text-align: left;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #38bdf8, #0ea5e9);
      transition: width 0.3s ease-out;
    }

    #question-text {
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      cursor: pointer;
      font-size: 0.86rem;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .option:hover {
      background: #f3f4ff;
      border-color: #c7d2fe;
    }

    .option input {
      display: none;
    }

    .radio-dot {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 1px solid #9ca3af;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .radio-inner {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: transparent;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .option.selected {
      background: #e0f2fe;
      border-color: #38bdf8;
    }

    .option.selected .radio-inner {
      background: #0ea5e9;
      transform: scale(1.05);
    }

    .buttons-column {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }

    button {
      width: 100%;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      background: #ffffff;
      font-size: 0.85rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, transform 0.08s ease;
    }

    button:hover:not(:disabled) {
      background: #f9fafb;
      border-color: #9ca3af;
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.08);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.45;
      cursor: default;
      box-shadow: none;
      transform: none;
    }

    #next-btn {
      border-color: #bfdbfe;
      background: #eff6ff;
    }

    #next-btn:hover:not(:disabled) {
      background: #dbeafe;
      border-color: #60a5fa;
    }

    #submit-btn {
      border-color: #22c55e;
      background: #22c55e;
      color: #ffffff;
      font-weight: 500;
    }

    #submit-btn:hover:not(:disabled) {
      background: #16a34a;
      border-color: #15803d;
      box-shadow: 0 6px 16px rgba(22, 163, 74, 0.25);
    }

    #status {
      margin-top: 8px;
      font-size: 0.76rem;
      color: #6b7280;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .result-main {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
    }

    .result-main h2 {
      margin: 0 0 6px;
      font-size: 0.95rem;
    }

    .score-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      font-size: 0.8rem;
      color: #374151;
    }

    .score-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
    }

    .percent-big {
      font-size: 1.4rem;
      font-weight: 700;
      text-align: left;
    }

    .percent-big.bad {
      color: #ef4444;
    }

    .percent-label {
      font-size: 0.72rem;
      color: #6b7280;
      text-align: left;
    }

    .muted {
      color: #6b7280;
      font-size: 0.78rem;
      margin-top: 4px;
    }

    .summary-question {
      padding-top: 4px;
      margin-top: 4px;
      border-top: 1px solid #e5e7eb;
      font-size: 0.82rem;
    }

    .summary-question:first-of-type {
      border-top: none;
      margin-top: 0;
      padding-top: 0;
    }

    .summary-question-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .summary-line {
      margin: 1px 0;
    }

    .summary-label {
      color: #6b7280;
    }

    .correct {
      color: #16a34a;
      font-weight: 600;
    }

    .incorrect {
      color: #dc2626;
      font-weight: 600;
    }

    .explanation {
      margin-top: 4px;
      color: #374151;
    }

    .quiz-disabled {
      opacity: 0.55;
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .card {
        padding: 14px 12px 12px;
      }
      #question-text {
        font-size: 0.88rem;
      }
      .option {
        font-size: 0.84rem;
      }
    }

  <div class="wrapper">

      <p class="subtitle">۲۰ سؤال چهارگزینه‌ای | فارماکوکینتیک و فارماکودینامیک عمومی | پاسخ‌ها بعد از پایان آزمون نمایش داده می‌شوند.</p>

          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>

  <script>
    const questions = [
      {
        text: "۱) کدام گزینه در مورد **اندازه مولکول دارو** و عبور از غشا صحیح‌تر است؟",
        options: [
          "A) هرچه دارو کوچک‌تر باشد، هم عبور از غشا و هم اختصاصیتش بیشتر می‌شود.",
          "B) داروهای بسیار بزرگ به‌راحتی از غشا عبور می‌کنند.",
          "C) دارو اگر خیلی کوچک باشد، احتمال واکنش متقاطعش زیاد می‌شود و اگر خیلی بزرگ باشد عبور از غشا دچار مشکل می‌شود.",
          "D) اندازه مولکول دارو در عبور از غشا نقشی ندارد."
        ],
        correctIndex: 2,
        explanation: "در جزوه آمده است داروهای خیلی کوچک اختصاصیت کمی دارند و ممکن است با مولکول‌های دیگر واکنش متقاطع بدهند، و داروهای خیلی بزرگ از غشا به‌خوبی عبور نمی‌کنند؛ بنابراین باید اندازهٔ «معتدل» داشته باشند."
      },
      {
        text: "۲) طبق توضیحات جزوه، برای این‌که دارو **به‌خوبی از غشا عبور کند و در GI جذب شود**، کدام ویژگی مهم‌تر است؟",
        options: [
          "A) محلول بودن فقط در آب",
          "B) محلول بودن فقط در چربی",
          "C) داشتن حلالیت مناسب هم در آب و هم در چربی",
          "D) نامحلول بودن در هر دو فاز"
        ],
        correctIndex: 2,
        explanation: "گفته شده دارو باید توانایی حل‌شدن هم در فاز آبی و هم در فاز چربی را داشته باشد؛ شاخصی هم برای نسبت حل‌شدن در آب/چربی ذکر شده است."
      },
      {
        text: "۳) بر اساس قانون هندرسون–هاسلبالخ در جزوه، کدام وضعیت باعث می‌شود یک **اسید ضعیف** بیشتر به صورت **غیر‌یونیزه** و قابل عبور از غشا باشد؟",
        options: [
          "A) محیط اسیدی",
          "B) محیط قلیایی",
          "C) pH خنثی (۷)",
          "D) pH نقشی ندارد"
        ],
        correctIndex: 0,
        explanation: "جزوه می‌گوید اسیدها در محیط قلیایی یونیزه و در محیط اسیدی بیشتر به فرم غیریونیزه در می‌آیند؛ فرم غیریونیزه بهتر از غشا عبور می‌کند."
      },
      {
        text: "۴) در جزوه، برای توضیح جذب بهتر یک **اسید ضعیف مثل آسپیرین**، کدام نکته ذکر شده است؟",
        options: [
          "A) فقط در معده جذب می‌شود، چون در روده کاملاً یونیزه است.",
          "B) در معده کاملاً یونیزه و در روده کاملاً غیریونیزه است.",
          "C) در معده به‌دلیل pH اسیدی کمتر یونیزه می‌شود ولی بیشترین سطح جذب در روده است، پس بخش عمدهٔ جذب در روده انجام می‌شود.",
          "D) فقط از طریق تزریق وریدی قابل مصرف است."
        ],
        correctIndex: 2,
        explanation: "اسید ضعیف در معده کمتر یونیزه می‌شود و می‌تواند مقداری جذب شود، اما به‌علت سطح وسیع روده و شرایط مناسب، بیشتر جذب در روده اتفاق می‌افتد."
      },
      {
        text: "۵) در مورد **motility دستگاه گوارش** و اثر آن بر جذب دارو، کدام گزینه صحیح است؟",
        options: [
          "A) افزایش شدید motility همیشه جذب را افزایش می‌دهد.",
          "B) کاهش شدید motility مقدار جذب را کاهش می‌دهد.",
          "C) افزایش شدید motility می‌تواند مقدار جذب را کم کند، در حالی‌که کاهش motility بیشتر سرعت رسیدن دارو به خون را کم می‌کند.",
          "D) motility GI نقشی در جذب دارو ندارد."
        ],
        correctIndex: 2,
        explanation: "motility خیلی زیاد مثل اسهال مزمن باعث کاهش جذب می‌شود، در حالی‌که motility خیلی کم (مثلاً در افراد دیابتی) سرعت جذب را کاهش می‌دهد، ولی لزوماً مقدار کلی جذب را عوض نمی‌کند."
      },
      {
        text: "۶) کدام مورد بر اساس جزوه باعث **کاهش جذب داروی تزریق‌شده داخل عضله** می‌شود؟",
        options: [
          "A) افزایش جریان خون بافت",
          "B) شوک و انقباض عروق بافت محل تزریق",
          "C) گرم‌کردن موضع تزریق",
          "D) ماساژ ملایم موضع پس از تزریق"
        ],
        correctIndex: 1,
        explanation: "در شوک به‌علت انقباض عروق بافت عضله، خون‌رسانی و در نتیجه جذب دارو از آن محل کاهش می‌یابد."
      },
      {
        text: "۷) در جزوه، کدام‌یک از **روش‌های تجویز** زیر به‌عنوان روشی که دارو را از طریق پوست و به‌صورت پَچ به بدن می‌رساند معرفی شده است؟",
        options: [
          "A) Oral",
          "B) Parenteral",
          "C) Inhalation",
          "D) Transdermal"
        ],
        correctIndex: 3,
        explanation: "روش transdermal به‌صورت پچ روی پوست (مثل پچ نیکوتین برای ترک اعتیاد) معرفی شده که دارو باید از پوست عبور کند و به گردش خون برسد."
      },
      {
        text: "۸) کدام گزینه **نمونه‌ای از تجویز ترانس‌درمال** است که در جزوه ذکر شده؟",
        options: [
          "A) اسپری سالبوتامول",
          "B) پچ نیکوتین برای ترک اعتیاد",
          "C) شیاف دیکلوفناک",
          "D) قطرهٔ چشمی آتروپین"
        ],
        correctIndex: 1,
        explanation: "به‌طور مشخص در جزوه از «پچ نیکوتین برای ترک اعتیاد» به‌عنوان مثال transdermal نام برده شده است."
      },
      {
        text: "۹) کدام مورد در مورد **تجویز زیرزبانی (sublingual)** نسبت به روش خوراکی معمولی **مزیت** محسوب می‌شود؟",
        options: [
          "A) عبور حتمی از کبد و متابولیسم عبور اول",
          "B) شروع اثر کندتر",
          "C) اجتناب از عبور اول کبدی و شروع اثر سریع‌تر",
          "D) مناسب‌تر بودن برای داروهای بسیار نامحلول"
        ],
        correctIndex: 2,
        explanation: "برخی روش‌های خوراکی مثل زیرزبانی برای عبور سریع‌تر دارو به خون و کاهش عبور اول کبدی استفاده می‌شوند."
      },
      {
        text: "۱۰) کدام گزینه تعریف **Clearance (حذف دارو)** را طبق جزوه درست بیان می‌کند؟",
        options: [
          "A) درصدی از دارو که در کلیه بازجذب می‌شود.",
          "B) حجمی از خون که در واحد زمان از دارو پاک می‌شود.",
          "C) مقدار داروی دفع‌شده در ادرار در ۲۴ ساعت.",
          "D) حجم توزیع دارو در مایعات بدن."
        ],
        correctIndex: 1,
        explanation: "کلیرنس به‌صورت «حجمی از خون که در واحد زمان توسط یک ماده از آن پاک می‌شود» تعریف شده است."
      },
      {
        text: "۱۱) در جزوه، کدام عضو به‌عنوان **مهم‌ترین عضو در دفع دارو (excretion)** معرفی شده است؟",
        options: [
          "A) ریه",
          "B) پوست",
          "C) کلیه",
          "D) روده"
        ],
        correctIndex: 2,
        explanation: "در مسیرهای دفع دارو، کلیه به‌عنوان مهم‌ترین عضو دفع‌کننده معرفی شده است."
      },
      {
        text: "۱۲) در مورد **نیمه‌عمر (t½)** دارو طبق جزوه، کدام گزینه صحیح است؟",
        options: [
          "A) مدت‌زمانی است که طی آن دارو به‌طور کامل از بدن حذف می‌شود.",
          "B) مدت‌زمانی است که طی آن غلظت خونی دارو به نصف کاهش می‌یابد.",
          "C) همیشه برای همهٔ داروها ۴ ساعت است.",
          "D) فقط به دوز دارو بستگی دارد و ربطی به متابولیسم ندارد."
        ],
        correctIndex: 1,
        explanation: "نیمه‌عمر به‌صورت «مدت زمانی که طی آن غلظت خونی دارو نصف شود» تعریف شده است."
      },
      {
        text: "۱۳) در مثال جزوه، برای افزایش مدت اثر پنی‌سیلین در گذشته از کدام دارو استفاده می‌شد که **ترشح فعال کلیوی آن را مهار** کند؟",
        options: [
          "A) دیگوکسین",
          "B) پروبنسید (Probenecid)",
          "C) فاموتیدین",
          "D) رانیتیدین"
        ],
        correctIndex: 1,
        explanation: "به بیمار همراه با پنی‌سیلین، پروبن‌سید داده می‌شد که با باند شدن به کریر پروتئینی ترشح‌کننده پنی‌سیلین، دفع آن را کم و مدت اثرش را زیاد می‌کند."
      },
      {
        text: "۱۴) در جزوه، مثالی از **تمایز ژنتیکی در متابولیسم دارو** ذکر شده است. این مثال مربوط به کدام دارو یا مسیر است؟",
        options: [
          "A) نقص در تبدیل استامینوفن به متابولیت سمی",
          "B) نقص در آنزیم متابولیزه‌کننده دیگوکسین",
          "C) نقص در آنزیم CYP2D6 در تبدیل کدئین به مورفین",
          "D) نقص در متابولیسم آسپیرین به سالیسیلات"
        ],
        correctIndex: 2,
        explanation: "حدود ۲٪ افراد دچار اختلال در آنزیم CYP2D6 هستند که در تبدیل کدئین به مورفین نقش دارد و باعث تفاوت پاسخ دارویی می‌شود."
      },
      {
        text: "۱۵) کدام بخش از فارماکوکینتیک در جزوه به‌عنوان **چهار مرحله اصلی** ذکر شده است؟",
        options: [
          "A) جذب، متابولیسم، تخمیر، دفع",
          "B) جذب، توزیع، متابولیسم، دفع",

        ],

      },

        options: [

        options: [

        explanation: "داروی B از نظر محل اتصال مثل داروی A (آگونیست) است و رقابتی روی همان گیرنده می‌نشیند بدون اینکه خودش اثر فعال‌کننده داشته باشد؛ بنابراین آنتاگونیست رقابتی است."

      {

        explanation: "مثال پروتامین سولفات که در خون به هپارین متصل شده و اثر ضدانعقادی آن را خنثی می‌کند، در جزوه به‌عنوان آنتاگونیسم شیمیایی ذکر شده است."

    let currentQuestionIndex = 0;
    const userAnswers = new Array(questions.length).fill(null);

    const questionHeaderEl = document.getElementById("question-header");
    const questionTextEl = document.getElementById("question-text");
    const optionsEl = document.getElementById("options");
    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");
    const submitBtn = document.getElementById("submit-btn");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const quizAreaEl = document.getElementById("quiz-area");
    const progressFillEl = document.getElementById("progress-fill");
    const progressLabelEl = document.getElementById("progress-label");

    function renderQuestion() {
      const q = questions[currentQuestionIndex];
      questionHeaderEl.textContent = `سؤال ${currentQuestionIndex + 1} از ${questions.length}`;
      questionTextEl.textContent = q.text;
      optionsEl.innerHTML = "";

      q.options.forEach((opt, idx) => {
        const label = document.createElement("label");
        label.className = "option";

        const input = document.createElement("input");
        input.type = "radio";
        input.name = "option";
        input.value = idx;

        if (userAnswers[currentQuestionIndex] === idx) {
          input.checked = true;
          label.classList.add("selected");
        }

        input.addEventListener("change", () => {
          userAnswers[currentQuestionIndex] = idx;

          Array.from(optionsEl.querySelectorAll(".option")).forEach(el => el.classList.remove("selected"));
          label.classList.add("selected");

          updateStatus();
          autoNext();
        });

        const radio = document.createElement("div");
        radio.className = "radio-dot";
        const inner = document.createElement("div");
        inner.className = "radio-inner";
        radio.appendChild(inner);

        const textSpan = document.createElement("span");
        textSpan.textContent = opt;

        label.appendChild(input);
        label.appendChild(radio);
        label.appendChild(textSpan);
        optionsEl.appendChild(label);
      });

      prevBtn.disabled = currentQuestionIndex === 0;
      nextBtn.disabled = currentQuestionIndex === questions.length - 1;

      updateStatus();
    }

    function updateStatus() {
      const answeredCount = userAnswers.filter(a => a !== null).length;
      const total = questions.length;
      const percent = total === 0 ? 0 : Math.round((answeredCount / total) * 100);

      statusEl.innerHTML = `
        <span>پاسخ‌داده‌شده: ${answeredCount} از ${total}</span>
        <span>پیشرفت: ${percent}٪</span>
      `;

      progressFillEl.style.width = percent + "%";
      progressLabelEl.textContent = percent + "% انجام شده";
    }

    function goToNext() {
      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
      }
    }

    function goToPrev() {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderQuestion();
      }
    }

    function autoNext() {
      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
      }
    }

    prevBtn.addEventListener("click", goToPrev);
    nextBtn.addEventListener("click", goToNext);

    submitBtn.addEventListener("click", () => {
      let correctCount = 0;
      let unansweredCount = 0;

      questions.forEach((q, i) => {
        if (userAnswers[i] === null) {
          unansweredCount++;
        } else if (userAnswers[i] === q.correctIndex) {
          correctCount++;
        }
      });

      const total = questions.length;
      const percent = total === 0 ? 0 : Math.round((correctCount / total) * 100);

      let html = `
        <div class="card">
          <div class="result-main">
            <div>
              <h2>نتیجه آزمون</h2>
              <div class="score-chip">
                <span class="score-dot"></span>
                <span>${correctCount} سؤال درست از ${total}</span>
              </div>
              ${unansweredCount > 0
                ? `<p class="muted">${unansweredCount} سؤال بدون پاسخ بود (در محاسبه، نادرست محسوب شده‌اند).</p>`
                : `<p class="muted">همه سؤالات را پاسخ داده‌اید.</p>`
              }
            </div>
            <div>
              <div class="percent-big ${percent < 60 ? "bad" : ""}">${percent}٪</div>
              <div class="percent-label">درصد نهایی</div>
            </div>
          </div>
        </div>
        <div class="card">
          <h2 style="margin:0 0 6px;font-size:0.9rem;">بررسی سؤالات</h2>
          <p class="muted" style="margin-top:0;">برای هر سؤال، پاسخ خودت، پاسخ صحیح و توضیح جزوه نوشته شده است.</p>
      `;

      questions.forEach((q, i) => {
        const userIndex = userAnswers[i];
        const isCorrect = userIndex === q.correctIndex;
        const userText = userIndex !== null ? q.options[userIndex] : "بدون پاسخ";
        const correctText = q.options[q.correctIndex];
        const explanationText = q.explanation || "توضیحی ثبت نشده است.";

        html += `
          <div class="summary-question">
            <div class="summary-question-title">سؤال ${i + 1}</div>
            <div class="summary-line">
              <span class="summary-label">متن سؤال: </span>${q.text}
            </div>
            <div class="summary-line">
              <span class="summary-label">پاسخ شما: </span>
              <span class="${isCorrect ? "correct" : "incorrect"}">${userText}</span>
            </div>
            <div class="summary-line">
              <span class="summary-label">پاسخ صحیح: </span>
              <span class="correct">${correctText}</span>
            </div>
            <div class="explanation">
              <span class="summary-label">توضیح: </span>${explanationText}
            </div>
          </div>
        `;
      });

      html += "</div>";

      resultEl.innerHTML = html;

      quizAreaEl.classList.add("quiz-disabled");
    });

    // init
    renderQuestion();
  </script>
