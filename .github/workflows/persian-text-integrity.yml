name: Persian Text Integrity

on:
  push:
    branches:
      - main
    paths:
      - "public_html/**"
      - "scripts/check_text_integrity.py"
      - "CONTRIBUTING-UTF8.md"
      - ".github/workflows/persian-text-integrity.yml"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "public_html/**"
      - "scripts/check_text_integrity.py"
      - "CONTRIBUTING-UTF8.md"
      - ".github/workflows/persian-text-integrity.yml"

permissions:
  contents: read

concurrency:
  group: persian-text-integrity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify UTF-8 and Persian text integrity
        run: python scripts/check_text_integrity.py
